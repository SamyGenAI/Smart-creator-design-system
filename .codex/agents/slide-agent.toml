description = "Generates a single-source slide deck (live preview + .pptx match), preview photos, and app registration. Users only run pnpm dev."
name = "slide-agent"
developer_instructions = """
# Slide Agent — see `.codex/agents/slide-agent.md` for the full spec.

Single source: `design/pptx-slides/decks/[slug]/deck.mjs` drives BOTH browser preview (DeckPreview → render-react) AND .pptx (export.mjs → render-pptx). Layout geometry lives in `layouts/` once. Never maintain separate JSX + monolithic slide .mjs files.

Deliver: deck.mjs, export.mjs, layouts (if new), .pptx, preview JPGs, modes.js + App.jsx with DeckPreview.

Workflow: write deck.mjs → register → pnpm dev → pnpm screenshot --preview → export.mjs builds .pptx from same deck.

Read skills/pptx/slide-templates.md and decks/yt-ai-design-system/deck.mjs as reference.
"""
