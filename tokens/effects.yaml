# Design Tokens — Effects
# Source: Figma file GBovqF34FkjgtWPj3wUmO3 (Foundations > elevation node 4:457)

# ─── ELEVATION / DROP SHADOWS ─────────────────────────────────────────────────
# From Figma: dropshadow/100 through dropshadow/500

elevation:
  100:
    # Subtle lift
    shadow: "0px 1px 4px 0px rgba(12, 12, 13, 0.05)"
  200:
    # Two-layer soft shadow
    shadow: "0px 1px 4px 0px rgba(12, 12, 13, 0.05), 0px 1px 4px 0px rgba(12, 12, 13, 0.10)"
  400:
    # Medium depth
    shadow: "0px 4px 4px -4px rgba(12, 12, 13, 0.10), 0px 16px 32px -4px rgba(12, 12, 13, 0.10)"
  500:
    # Strong depth
    shadow: "0px 4px 4px -4px rgba(12, 12, 13, 0.10), 0px 16px 16px -8px rgba(12, 12, 13, 0.10)"

# ─── COMPONENT SHADOWS ────────────────────────────────────────────────────────
# Used in infographic components

shadows:
  card:         "0px 4px 4px 0px rgba(0, 0, 0, 0.25)"  # Standard component shadow
  bullet-badge: "0px 4px 4px 0px rgba(0, 0, 0, 0.25)"
  logo-cell:    "0px 4px 4px 0px rgba(0, 0, 0, 0.25)"
  avatar:       "0px 4px 4px 0px rgba(0, 0, 0, 0.25)"

# ─── BORDERS ──────────────────────────────────────────────────────────────────

borders:
  glass-section:
    width:  "3px"
    style:  "solid"
    color:  "white"
    radius: "20px"

  glass-section-header:
    width:  "3px"
    style:  "solid"
    color:  "white"
    radius: "10px"

  card-blue:
    width:  "1px"
    style:  "solid"
    color:  "#7edaff"   # --border/blue
    radius: "7.951px"

  logo-cell:
    radius: "5px"

  footer:
    radius: "40px"
    width:  "3px"
    style:  "solid"
    color:  "white"

  avatar:
    radius: "40px"
    width:  "2px"
    style:  "solid"
    color:  "white"

# ─── TEXTURE ──────────────────────────────────────────────────────────────────

texture:
  square-grid:
    opacity:    0.05
    file:       "assets/textures/square-grid.png"
    blend-mode: "normal"
